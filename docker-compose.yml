services:
  web:
    build: .
    container_name: acentra-web
    ports:
      - "${APP_PORT}:80"
    restart: always
  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: acentra-tunnel
    command: tunnel run --token ${TUNNEL_TOKEN}
    restart: always
    depends_on:
      - web

