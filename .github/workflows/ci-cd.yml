name: CI/CD Build & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run lint (Type check)
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Load NVM (Node Version Manager) agar perintah node & npm aktif
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            # 2. Inisialisasi/Clone repo jika folder /var/www/acentra bukan repository git
            if [ ! -d "/var/www/acentra/.git" ]; then
              echo "Folder /var/www/acentra belum di-clone. Melakukan clone..."
              mkdir -p /var/www/acentra
              rm -rf /var/www/acentra/* 2>/dev/null || true
              git clone git@github.com:Fdlnahmd/acentra.git /var/www/acentra
            fi

            # 3. Masuk ke folder, update kode, dan build project
            cd /var/www/acentra
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            npm install
            npm run build
