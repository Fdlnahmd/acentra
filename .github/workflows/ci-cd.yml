name: CI/CD Build & Deploy

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build and Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install

      - name: Run lint (Type check)
        run: npm run lint

      - name: Build application
        run: npm run build

  deploy:
    name: Deploy to VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # 1. Inisialisasi/Clone repo jika folder /home/acentra/acentra bukan repository git
            if [ ! -d "/home/acentra/acentra/.git" ]; then
              echo "Folder /home/acentra/acentra belum di-clone. Melakukan clone..."
              mkdir -p /home/acentra/acentra
              rm -rf /home/acentra/acentra/* 2>/dev/null || true
              git clone git@github.com:Fdlnahmd/acentra.git /home/acentra/acentra
            fi

            # 2. Masuk ke folder, update kode, dan jalankan docker compose
            cd /home/acentra/acentra
            git fetch origin ${{ github.ref_name }}
            git reset --hard origin/${{ github.ref_name }}
            docker compose up -d --build --remove-orphans
            docker compose ps
            docker image prune -f
